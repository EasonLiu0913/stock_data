name: Crawl TWSE MI Index

on:
  schedule:
    # 平日 14:37 台北時間 (06:37 UTC)
    - cron: '37 6 * * 1-5'
    # 平日 15:23 台北時間 (07:23 UTC)
    - cron: '23 7 * * 1-5'
    # 平日 16:29 台北時間 (08:29 UTC)
    - cron: '29 8 * * 1-5'
    # 平日 17:31 台北時間 (09:31 UTC)
    - cron: '31 9 * * 1-5'
    # 平日 18:41 台北時間 (10:41 UTC)
    - cron: '41 10 * * 1-5'
    # 平日 19:43 台北時間 (11:43 UTC)
    - cron: '43 11 * * 1-5'
    # 平日 20:47 台北時間 (12:47 UTC)
    - cron: '47 12 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target Date (YYYYMMDD format, e.g., 20260623)'
        required: false
        default: ''
      type:
        description: 'TWSE MI_INDEX type'
        required: false
        default: 'ALL'

jobs:
  crawl-twse-mi-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check existing TWSE MI_INDEX file
        id: existing
        run: |
          DATE_INPUT="${{ github.event.inputs.date }}"
          if [ -n "$DATE_INPUT" ]; then
            TARGET_DATE="$DATE_INPUT"
          else
            # Before 03:00 Taipei time, the market data still belongs to the previous day.
            TARGET_DATE=$(TZ='Asia/Taipei' date --date='3 hours ago' '+%Y%m%d')
          fi

          OUTPUT_FILE="data_twse_mi_index/${TARGET_DATE}_twse_mi_index.json"
          echo "target_date=$TARGET_DATE" >> "$GITHUB_OUTPUT"
          echo "output_file=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"

          if [ -f "$OUTPUT_FILE" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "TWSE MI_INDEX file already exists: $OUTPUT_FILE"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.existing.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.existing.outputs.exists != 'true'
        run: npm ci

      - name: Run TWSE MI_INDEX crawler
        if: steps.existing.outputs.exists != 'true'
        run: |
          ARGS=(--date "${{ steps.existing.outputs.target_date }}" --max-retries 0)

          if [ -n "${{ github.event.inputs.type }}" ]; then
            ARGS+=(--type "${{ github.event.inputs.type }}")
          fi

          node scripts/crawl_twse_mi_index.js "${ARGS[@]}"

      - name: Generate files.json
        if: steps.existing.outputs.exists != 'true'
        run: |
          node scripts/generate_file_lists.js || echo "generate_file_lists.js not found, skipping"

      - name: Commit and push changes
        if: steps.existing.outputs.exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_twse_mi_index/

          if git diff --staged --quiet; then
            echo "No TWSE MI_INDEX changes to commit"
            exit 0
          fi

          CURRENT_DATE=$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S')
          git commit -m "chore: update TWSE MI_INDEX data ${CURRENT_DATE}"

          git pull --rebase origin main
          git push origin main
