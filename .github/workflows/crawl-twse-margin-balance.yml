name: Crawl TWSE Margin Balance

on:
  schedule:
    # 平日 20:17 台北時間 (12:17 UTC)
    - cron: '17 12 * * 1-5'
    # 平日 21:23 台北時間 (13:23 UTC)
    - cron: '23 13 * * 1-5'
    # 平日 22:29 台北時間 (14:29 UTC)
    - cron: '29 14 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: 'Expected data date (YYYYMMDD). Leave empty for latest.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  crawl-twse-margin-balance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check existing TWSE margin balance file
        id: existing
        run: |
          DATE_INPUT="${{ github.event.inputs.date }}"
          if [ -n "$DATE_INPUT" ]; then
            TARGET_DATE="$DATE_INPUT"
          else
            # Before 03:00 Taipei time, the market data still belongs to the previous day.
            TARGET_DATE=$(TZ='Asia/Taipei' date --date='3 hours ago' '+%Y%m%d')
          fi

          OUTPUT_FILE="data_twse_margin_balance/${TARGET_DATE}_twse_margin_balance.csv"
          echo "target_date=$TARGET_DATE" >> "$GITHUB_OUTPUT"
          echo "output_file=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"

          if [ -f "$OUTPUT_FILE" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "TWSE margin balance file already exists: $OUTPUT_FILE"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.existing.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.existing.outputs.exists != 'true'
        run: npm ci

      - name: Crawl TWSE margin balance data
        if: steps.existing.outputs.exists != 'true'
        run: |
          node scripts/crawl_twse_margin_balance.js --date "${{ steps.existing.outputs.target_date }}"

      - name: Commit and push changes
        if: steps.existing.outputs.exists != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data_twse_margin_balance/

          if git diff --staged --quiet; then
            echo "No TWSE margin balance changes"
            exit 0
          fi

          CURRENT_DATE=$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S')
          git commit -m "chore: update TWSE margin balance data ${CURRENT_DATE}"

          git pull --rebase origin main
          git push origin main
