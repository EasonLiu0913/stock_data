name: Crawl TWSE Foreign Investors

on:
  schedule:
    # 每天 15:53 台北時間 (07:53 UTC)
    - cron: '53 7 * * *'
    # 每天 16:37 台北時間 (08:37 UTC)
    - cron: '37 8 * * *'
    # 每天 17:41 台北時間 (09:41 UTC)
    - cron: '41 9 * * *'
    # 每天 18:43 台北時間 (10:43 UTC)
    - cron: '43 10 * * *'
    # 每天 19:47 台北時間 (11:47 UTC)
    - cron: '47 11 * * *'
    # 每天 20:49 台北時間 (12:49 UTC)
    - cron: '49 12 * * *'
    # 每天 21:51 台北時間 (13:51 UTC)
    - cron: '51 13 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target Date (YYYYMMDD format, e.g., 20260623)'
        required: false
        default: ''

jobs:
  crawl-twse-foreign-investors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check existing TWSE foreign investors file
        id: existing
        run: |
          DATE_INPUT="${{ github.event.inputs.date }}"
          if [ -n "$DATE_INPUT" ]; then
            TARGET_DATE="$DATE_INPUT"
          else
            TARGET_DATE=$(TZ='Asia/Taipei' date '+%Y%m%d')
          fi

          OUTPUT_FILE="data_twse_foreign_investors/${TARGET_DATE}_twse_foreign_investors.json"
          echo "target_date=$TARGET_DATE" >> "$GITHUB_OUTPUT"
          echo "output_file=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"

          if [ -f "$OUTPUT_FILE" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "TWSE foreign investors file already exists: $OUTPUT_FILE"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.existing.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.existing.outputs.exists != 'true'
        run: npm ci

      - name: Run TWSE foreign investors crawler
        if: steps.existing.outputs.exists != 'true'
        run: |
          node scripts/crawl_twse_foreign_investors.js \
            --date "${{ steps.existing.outputs.target_date }}" \
            --max-retries 0 \
            --rate-limit-cooldown 180000

      - name: Generate files.json
        if: steps.existing.outputs.exists != 'true'
        run: |
          node scripts/generate_file_lists.js || echo "generate_file_lists.js not found, skipping"

      - name: Commit and push changes
        if: steps.existing.outputs.exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_twse_foreign_investors/

          if git diff --staged --quiet; then
            echo "No TWSE foreign investors changes to commit"
            exit 0
          fi

          CURRENT_DATE=$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S')
          git commit -m "chore: update TWSE foreign investors data ${CURRENT_DATE}"

          git pull --rebase origin main
          git push origin main
