<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外資連續買超股票</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 2400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        h1 {
            color: #2d3748;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #718096;
            font-size: 1.1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: #718096;
            font-size: 0.9rem;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-height: 75vh;
            overflow-y: auto;
            overflow-x: auto;
            /* Allow horizontal scrolling */
            -webkit-overflow-scrolling: touch;
            /* Smooth scrolling on iOS */
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
            /* Ensure table doesn't get too squeezed */
        }

        thead {
            /* background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); */
            /* Background moved to th for sticky support */
            color: white;
        }

        th {
            padding: 1.2rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 10;
            background: #667eea;
            box-shadow: 0 2px 2px rgba(0, 0, 0, 0.1);
        }

        tbody tr {
            border-bottom: 1px solid #e2e8f0;
            transition: background-color 0.2s ease;
        }

        tbody tr:hover {
            background-color: #f7fafc;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        td {
            padding: 1rem 1.2rem;
            color: #2d3748;
        }

        .stock-code {
            font-weight: 600;
            color: #667eea;
            font-size: 1.1rem;
        }

        .stock-code a {
            color: #667eea;
            text-decoration: none;
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
        }

        .stock-code a:hover {
            color: #764ba2;
            border-bottom: 2px solid #764ba2;
        }

        .positive {
            color: #e53e3e;
            font-weight: 600;
        }

        .negative {
            color: #38a169;
            font-weight: 600;
        }

        .neutral {
            color: #2d3748;
            font-weight: 600;
        }

        .day-values {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .day-value {
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            background: #e6fffa;
            color: #234e52;
        }

        .serial-col {
            text-align: center;
            width: 60px;
            font-weight: bold;
            color: #cbd5e0;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: white;
            font-size: 1.2rem;
        }

        .sort-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .sort-container label {
            color: #2d3748;
            font-weight: 600;
            font-size: 1rem;
        }

        .sort-container select {
            padding: 0.75rem 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            color: #2d3748;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .sort-container select:hover {
            border-color: #667eea;
        }

        .sort-container select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .error {
            background: #fed7d7;
            color: #742a2a;
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem 0.5rem;
                /* Reduce side padding on mobile */
            }

            .container {
                width: 100%;
                overflow-x: hidden;
                /* Prevent body scroll from container overflow */
            }

            .header {
                padding: 1.5rem;
                margin-bottom: 1.5rem;
                border-radius: 15px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.9rem;
            }

            .stats {
                grid-template-columns: 1fr 1fr;
                /* 2 columns on mobile */
                gap: 0.8rem;
            }

            .stat-card {
                padding: 1rem;
            }

            .stat-value {
                font-size: 1.8rem;
            }

            .sort-container {
                flex-direction: column;
                align-items: stretch;
                padding: 1rem;
            }

            .sort-container label {
                margin-bottom: 0.5rem;
            }

            .sort-container select {
                width: 100%;
            }

            table {
                font-size: 0.9rem;
            }

            th,
            td {
                padding: 0.8rem 0.5rem;
                /* Reduce cell padding */
                white-space: nowrap;
                /* Keep content on one line for scrolling */
            }

            .day-values {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
                /* 1 column on very small screens */
            }
        }

        .search-container {
            margin-left: auto;
            display: flex;
            gap: 0.5rem;
        }

        .search-container input {
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            width: 200px;
        }

        .search-container input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-container button {
            padding: 0.75rem 1.2rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-container button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .highlight-row {
            background-color: #fffaf0 !important;
            outline: 2px solid #ed8936;
            transition: all 0.5s ease;
            z-index: 5;
            position: relative;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎯 外資連續買超股票</h1>
            <p class="subtitle" id="dataDate" style="color: #667eea; font-weight: 600; margin-top: 0.5rem;"></p>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalStocks">-</div>
                <div class="stat-label">符合條件股票數</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalBuy">-</div>
                <div class="stat-label">4日累計買超（張）</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgBuy">-</div>
                <div class="stat-label">平均每日買超（張）</div>
            </div>
        </div>

        <div class="sort-container">
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <label for="typeSelect">類型：</label>
                <select id="typeSelect" onchange="onTypeChanged()">
                    <option value="buy" selected>外資買超</option>
                    <option value="sell">外資賣超</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <label for="dateSelect">日期：</label>
                <select id="dateSelect" onchange="onDateChanged()"></select>
            </div>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <label for="sortSelect">排序：</label>
                <select id="sortSelect" onchange="sortStocks()">
                    <option value="consecutive" selected>連續最多天買超排行</option>
                    <option value="total">4日累計（從多到少）</option>
                    <option value="growth">第1天→第2天成長率（從大到小）</option>
                    <option value="three-days">四天中有三天在買（4日累計從大到小）</option>
                </select>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="搜尋代號或名稱..."
                    onkeyup="if(event.key === 'Enter') searchStock()">
                <button onclick="searchStock()">🔍</button>
            </div>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">載入中...</div>
            <div id="error" style="display: none;"></div>
            <table id="stockTable" style="display: none;">
                <thead id="tableHead">
                    <tr>
                        <th>股票代號</th>
                        <th>股票名稱</th>
                        <th>連續天數</th>
                        <th>第1天</th>
                        <th>第2天</th>
                        <th>第3天</th>
                        <th>第4天</th>
                        <th>第5天</th>
                        <th>第6天</th>
                        <th>第7天</th>
                        <th>第8天</th>
                        <th>第9天</th>
                        <th>第10天</th>
                        <th>10日累計</th>
                        <th>10日平均</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allFilteredStocks = []; // 儲存所有符合條件的股票資料
        let currentDataDateStr = ''; // 儲存當前資料日期字串 (YYYYMMDD)
        let fileList = []; // 儲存所有可用的檔案列表
        let displayedStocks = []; // 當前顯示中的股票（供 header 排序使用）
        let headerSort = { key: null, direction: 'desc' }; // 點擊表頭排序狀態
        let currentType = 'buy'; // buy: 外資買超, sell: 外資賣超

        // TODO: 台股可能會遇到颱風天或其他因素停市，所以建議從 /data_fubon/files.json 往前找日期
        // 計算過去 N 個交易日（跳過週末）
        function getTradingDates(baseDateStr, count) {
            const dates = [];
            // 解析基本日期 (YYYYMMDD)
            const year = parseInt(baseDateStr.substring(0, 4));
            const month = parseInt(baseDateStr.substring(4, 6)) - 1; // Month is 0-indexed
            const day = parseInt(baseDateStr.substring(6, 8));

            let currentDate = new Date(year, month, day);

            for (let i = 0; i < count; i++) {
                // 如果是週六 (6) 或週日 (0)，往前推一天直到平日
                // 注意：這裡假設資料也是跳過週末的。如果碰到連假，
                // 因為沒有行事曆 API，可能會有些微誤差，但對一般週末有效。
                while (currentDate.getDay() === 0 || currentDate.getDay() === 6) {
                    currentDate.setDate(currentDate.getDate() - 1);
                }

                // 格式化日期 MM/DD
                const mm = (currentDate.getMonth() + 1).toString().padStart(2, '0');
                const dd = currentDate.getDate().toString().padStart(2, '0');
                dates.push(`${mm}/${dd}`);

                // 準備下一個迴圈，日期往前推一天
                currentDate.setDate(currentDate.getDate() - 1);
            }
            return dates;
        }

        // 取得 URL 參數
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                sort: params.get('sort'),
                date: params.get('date'),
                type: params.get('type')
            };
        }

        // 更新 URL 參數
        function updateUrlParams(sort, date, type) {
            const params = new URLSearchParams(window.location.search);
            if (sort) params.set('sort', sort);
            if (date) params.set('date', date);
            if (type) params.set('type', type);
            const newUrl = `${window.location.pathname}${params.toString() ? '?' + params.toString() : ''}`;
            window.history.replaceState({}, '', newUrl);
        }

        async function init() {
            // 1. 載入檔案列表並初始化日期選單
            await loadFileList();

            // 2. 確定要載入的日期 (從 URL 或預設最新)
            const urlParams = getUrlParams();
            let targetDate = urlParams.date;
            if (urlParams.type === 'sell' || urlParams.type === 'buy') {
                currentType = urlParams.type;
            }
            document.getElementById('typeSelect').value = currentType;
            updateTypeLabels();

            // 如果 URL 沒有指定日期，或指定的日期不在列表中，選第一個（最新）
            const dateSelect = document.getElementById('dateSelect');
            if (!targetDate || !Array.from(dateSelect.options).some(opt => opt.value === targetDate)) {
                if (dateSelect.options.length > 0) {
                    targetDate = dateSelect.options[0].value;
                }
            }

            // 更新選單選取狀態
            if (targetDate) {
                dateSelect.value = targetDate;
                // 3. 載入該日期的資料
                await loadData(targetDate);
            }
        }

        async function loadFileList() {
            try {
                const isGitHubPages = window.location.hostname.includes('github.io');
                const basePath = isGitHubPages ? '/stock_data' : '..';

                const response = await fetch(`${basePath}/data_fubon/files.json`);
                if (!response.ok) throw new Error('無法載入檔案列表');

                const files = await response.json();

                // 過濾出符合格式的檔案: fubon_YYYYMMDD_institutional.json
                const stockFiles = files
                    .filter(f => f.match(/^fubon_\d{8}_institutional\.json$/))
                    .sort().reverse(); // 最新日期在最前

                const dateSelect = document.getElementById('dateSelect');
                dateSelect.innerHTML = '';

                stockFiles.forEach(file => {
                    // 提取日期 YYYYMMDD
                    const match = file.match(/fubon_(\d{8})_institutional\.json/);
                    if (match) {
                        const dateStr = match[1];
                        const displayDate = `${dateStr.substring(0, 4)}/${dateStr.substring(4, 6)}/${dateStr.substring(6, 8)}`;
                        const option = document.createElement('option');
                        option.value = dateStr;
                        option.textContent = displayDate;
                        dateSelect.appendChild(option);
                    }
                });

            } catch (e) {
                console.error('初始化失敗:', e);
                // 失敗時的 Fallback
                const dateSelect = document.getElementById('dateSelect');
                const today = new Date();
                const dateStr = today.toISOString().split('T')[0].replace(/-/g, '');
                const option = document.createElement('option');
                option.value = dateStr;
                option.textContent = '載入失敗 (預設)';
                dateSelect.appendChild(option);
            }
        }

        async function onDateChanged() {
            const dateSelect = document.getElementById('dateSelect');
            const selectedDate = dateSelect.value;
            await loadData(selectedDate);
        }

        async function onTypeChanged() {
            currentType = document.getElementById('typeSelect').value;
            updateTypeLabels();
            const dateSelect = document.getElementById('dateSelect');
            await loadData(dateSelect.value);
        }

        function isTargetValue(value) {
            return currentType === 'sell' ? value < 0 : value > 0;
        }

        function getComparableValue(value) {
            return currentType === 'sell' ? Math.abs(value) : value;
        }

        function getTypeLabel() {
            return currentType === 'sell' ? '賣超' : '買超';
        }

        function updateTypeLabels() {
            const label = getTypeLabel();
            document.querySelector('h1').textContent = `🎯 外資連續${label}股票`;
            document.querySelector('#sortSelect option[value="consecutive"]').textContent = `連續最多天${label}排行`;
            document.querySelector('#sortSelect option[value="total"]').textContent = `4日累計${label}（從多到少）`;
            document.querySelector('#sortSelect option[value="three-days"]').textContent = `四天中有三天在${label}（4日累計從大到小）`;
        }

        async function loadData(dateStr) {
            if (!dateStr) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('stockTable').style.display = 'none';
            document.getElementById('error').style.display = 'none';

            try {
                const isGitHubPages = window.location.hostname.includes('github.io');
                const basePath = isGitHubPages ? '/stock_data' : '..';
                const fileName = `fubon_${dateStr}_institutional.json`;
                const dataPath = `${basePath}/data_fubon/${fileName}`;

                console.log(`Loading data for ${dateStr}: ${dataPath}`);

                const response = await fetch(dataPath);
                if (!response.ok) {
                    throw new Error(`無法載入資料: ${dataPath}`);
                }

                currentDataDateStr = dateStr;
                // 更新 URL
                updateUrlParams(null, dateStr, currentType);

                const formattedDate = `${dateStr.substring(0, 4)}/${dateStr.substring(4, 6)}/${dateStr.substring(6, 8)}`;
                document.getElementById('dataDate').textContent = `資料日期：${formattedDate}`;

                const data = await response.json();

                // 載入所有有 ForeignInvestors 資料的股票（至少 4 天）
                allFilteredStocks = [];

                for (const [stockCode, stockData] of Object.entries(data)) {
                    let foreignInvestors = stockData.ForeignInvestors;
                    let dates = [];

                    // Handle new Object format (Date -> Value)
                    if (foreignInvestors && !Array.isArray(foreignInvestors) && typeof foreignInvestors === 'object') {
                        // Sort dates descending (Newest first)
                        // Format "115/01/22" sorts correctly as string
                        const sortedDates = Object.keys(foreignInvestors).sort().reverse();
                        dates = sortedDates;
                        foreignInvestors = sortedDates.map(d => foreignInvestors[d]);
                    }

                    // 檢查是否有 ForeignInvestors 資料且至少有 4 天
                    if (foreignInvestors && foreignInvestors.length >= 4) {
                        const firstFour = foreignInvestors.slice(0, 4);
                        const total = firstFour.reduce((sum, val) => sum + val, 0);
                        const average = Math.round(total / 4);
                        const firstFourComparable = firstFour.map(getComparableValue);

                        // 計算第1天到第2天的成長率
                        const growthRate = firstFourComparable[1] !== 0
                            ? ((firstFourComparable[0] - firstFourComparable[1]) / Math.abs(firstFourComparable[1]) * 100)
                            : 0;

                        // 計算從第 1 天開始連續買超/賣超的天數
                        let consecutiveDays = 0;
                        for (let i = 0; i < foreignInvestors.length; i++) {
                            if (isTargetValue(foreignInvestors[i])) {
                                consecutiveDays++;
                            } else {
                                break;
                            }
                        }

                        allFilteredStocks.push({
                            code: stockCode,
                            name: stockData.StockName || '',
                            day1: firstFour[0],
                            day2: firstFour[1],
                            day3: firstFour[2],
                            day4: firstFour[3],
                            total: total,
                            average: average,
                            growthRate: growthRate,
                            consecutiveDays: consecutiveDays,
                            foreignInvestors: foreignInvestors,
                            dates: dates // Store the dates
                        });
                    }
                }

                // 檢查 URL 參數並設定下拉選單 (排序)
                const urlParams = getUrlParams();
                const validSortOptions = ['total', 'growth', 'three-days', 'consecutive'];

                if (urlParams.sort && validSortOptions.includes(urlParams.sort)) {
                    document.getElementById('sortSelect').value = urlParams.sort;
                } else {
                    document.getElementById('sortSelect').value = 'consecutive';
                }

                // 初始排序
                sortStocks();

                // 顯示表格，隱藏載入中
                document.getElementById('loading').style.display = 'none';
                document.getElementById('stockTable').style.display = 'table';

            } catch (error) {
                console.error('載入資料時發生錯誤:', error);
                document.getElementById('loading').style.display = 'none';
                const errorDiv = document.getElementById('error');
                errorDiv.style.display = 'block';
                errorDiv.className = 'error';
                errorDiv.textContent = '載入資料時發生錯誤: ' + error.message;
            }
        }

        function sortStocks() {
            const sortBy = document.getElementById('sortSelect').value;

            // 更新 URL 參數
            updateUrlParams(sortBy, currentDataDateStr, currentType);

            let stocksToDisplay = [];

            if (sortBy === 'total') {
                // 篩選出前四天都是買超/賣超的股票
                stocksToDisplay = allFilteredStocks.filter(stock => {
                    return [stock.day1, stock.day2, stock.day3, stock.day4].every(isTargetValue);
                });
                // 按照 4 日累計買超/賣超張數排序（由大到小）
                stocksToDisplay.sort((a, b) => getComparableValue(b.total) - getComparableValue(a.total));
            } else if (sortBy === 'growth') {
                // 篩選出前四天都是買超/賣超的股票
                stocksToDisplay = allFilteredStocks.filter(stock => {
                    return [stock.day1, stock.day2, stock.day3, stock.day4].every(isTargetValue);
                });
                // 按照成長率排序（由大到小）
                stocksToDisplay.sort((a, b) => b.growthRate - a.growthRate);
            } else if (sortBy === 'three-days') {
                // 篩選出四天中至少有三天是買超/賣超的股票
                stocksToDisplay = allFilteredStocks.filter(stock => {
                    const targetDays = [stock.day1, stock.day2, stock.day3, stock.day4].filter(isTargetValue).length;
                    return targetDays >= 3;
                });
                // 按照 4 日累計買超/賣超張數排序（由大到小）
                stocksToDisplay.sort((a, b) => getComparableValue(b.total) - getComparableValue(a.total));
            } else if (sortBy === 'consecutive') {
                // 篩選出至少連續 1 天買超/賣超的股票
                stocksToDisplay = allFilteredStocks.filter(stock => stock.consecutiveDays >= 1);
                // 按照連續買超/賣超天數排序（由大到小），天數相同時按連續期間累計排序
                stocksToDisplay.sort((a, b) => {
                    if (b.consecutiveDays !== a.consecutiveDays) {
                        return b.consecutiveDays - a.consecutiveDays;
                    }
                    // 計算連續期間的累計買超/賣超
                    const aConsecutiveTotal = a.foreignInvestors.slice(0, a.consecutiveDays).reduce((sum, val) => sum + val, 0);
                    const bConsecutiveTotal = b.foreignInvestors.slice(0, b.consecutiveDays).reduce((sum, val) => sum + val, 0);
                    return getComparableValue(bConsecutiveTotal) - getComparableValue(aConsecutiveTotal);
                });
            }

            // 下拉選單變更時，重置 header 排序狀態
            headerSort = { key: null, direction: 'desc' };
            displayedStocks = stocksToDisplay;

            // 重新渲染表格
            renderTable(stocksToDisplay, sortBy);

            // 更新統計資訊
            updateStats(stocksToDisplay, sortBy);
        }

        // 取得指定股票在某個 sort key 下的可比較值
        function getSortValue(stock, key) {
            if (key === 'code') {
                const n = parseInt(stock.code);
                return isNaN(n) ? stock.code : n;
            }
            if (key === 'name') return stock.name || '';
            if (key === 'consecutiveDays') return stock.consecutiveDays;
            if (key === 'total') return getComparableValue(stock.total);
            if (key === 'average') return getComparableValue(stock.average);
            if (key === 'total10') {
                const total10 = stock.foreignInvestors.slice(0, 10).reduce((s, v) => s + v, 0);
                return getComparableValue(total10);
            }
            if (key === 'avg10') {
                const t = stock.foreignInvestors.slice(0, 10).reduce((s, v) => s + v, 0);
                return getComparableValue(Math.round(t / 10));
            }
            if (key.startsWith('day')) {
                const idx = parseInt(key.substring(3));
                return getComparableValue(stock.foreignInvestors[idx] || 0);
            }
            return 0;
        }

        // 點擊表頭排序：第一次降冪，再點切換為升冪
        function sortByHeader(key) {
            if (headerSort.key === key) {
                headerSort.direction = headerSort.direction === 'desc' ? 'asc' : 'desc';
            } else {
                headerSort.key = key;
                headerSort.direction = 'desc';
            }

            const dir = headerSort.direction;
            const sorted = [...displayedStocks].sort((a, b) => {
                const va = getSortValue(a, key);
                const vb = getSortValue(b, key);
                if (typeof va === 'string' || typeof vb === 'string') {
                    const cmp = String(va).localeCompare(String(vb));
                    return dir === 'desc' ? -cmp : cmp;
                }
                return dir === 'desc' ? vb - va : va - vb;
            });
            displayedStocks = sorted;

            const sortBy = document.getElementById('sortSelect').value;
            renderTable(sorted, sortBy);
            updateStats(sorted, sortBy);
        }

        // 產生可排序的 th HTML
        function makeTh(label, key, extraClass = '') {
            let arrow = '';
            if (headerSort.key === key) {
                arrow = headerSort.direction === 'desc' ? ' ▼' : ' ▲';
            }
            const cls = extraClass ? ` class="${extraClass}"` : '';
            return `<th${cls} style="cursor:pointer;user-select:none;" onclick="sortByHeader('${key}')" data-sort-key="${key}">${label}${arrow}</th>`;
        }

        function renderTable(stocks = allFilteredStocks, sortBy = 'total') {
            const tableBody = document.getElementById('tableBody');
            const tableHead = document.getElementById('tableHead');
            tableBody.innerHTML = '';

            // 根據數值決定顏色類別的函數
            const getColorClass = (value) => {
                if (value > 0 && value < 1000) {
                    return 'neutral';  // 正數但小於 1000，用黑色
                } else if (value > 0) {
                    return 'positive'; // 正數且 >= 1000，用紅色
                } else if (value < 0) {
                    return 'negative'; // 負數，用綠色
                } else {
                    return '';         // 0，無特殊顏色
                }
            };

            // 根據排序模式設定表頭
            if (sortBy === 'consecutive') {
                // 10 天模式：顯示所有 10 天資料
                // 優先使用從資料中提取的日期
                let tradingDates = [];
                if (stocks.length > 0 && stocks[0].dates && stocks[0].dates.length > 0) {
                    tradingDates = stocks[0].dates.slice(0, 10);
                } else {
                    tradingDates = getTradingDates(currentDataDateStr || '20250101', 10);
                }

                let dateHeaders = '';
                tradingDates.forEach((date, i) => {
                    dateHeaders += makeTh(date, `day${i}`);
                });

                tableHead.innerHTML = `
                    <tr>
                        <th class="serial-col">#</th>
                        ${makeTh('股票代號', 'code')}
                        ${makeTh('股票名稱', 'name')}
                        ${makeTh('連續天數', 'consecutiveDays')}
                        ${dateHeaders}
                        ${makeTh('10日累計', 'total10')}
                        ${makeTh('10日平均', 'avg10')}
                    </tr>
                `;

                stocks.forEach((stock, index) => {
                    const row = document.createElement('tr');
                    const fi = stock.foreignInvestors;

                    // 計算 10 日累計和平均
                    const total10 = fi.slice(0, 10).reduce((sum, val) => sum + val, 0);
                    const avg10 = Math.round(total10 / 10);

                    // 生成每天的 td
                    let daysCells = '';
                    for (let i = 0; i < 10; i++) {
                        const value = fi[i] || 0;
                        const colorClass = getColorClass(value);
                        daysCells += `<td class="${colorClass}">${value.toLocaleString()}</td>`;
                    }

                    row.innerHTML = `
                        <td class="serial-col">${index + 1}</td>
                        <td class="stock-code"><a href="https://fubon-ebrokerdj.fbs.com.tw/z/zc/zcw/zcw1_${stock.code}.djhtm" target="_blank">${stock.code}</a></td>
                        <td class="stock-code"><a href="https://fubon-ebrokerdj.fbs.com.tw/z/zc/zcw/zcw1_${stock.code}.djhtm" target="_blank">${stock.name}</a></td>
                        <td style="font-weight: bold; color: #667eea;">${stock.consecutiveDays}</td>
                        ${daysCells}
                        <td class="${getColorClass(total10)}" style="font-weight: bold;">${total10.toLocaleString()}</td>
                        <td class="${getColorClass(avg10)}">${avg10.toLocaleString()}</td>
                    `;
                    tableBody.appendChild(row);
                });
            } else {
                // 4 天模式：原本的顯示邏輯
                // 優先使用從資料中提取的日期
                let tradingDates = [];
                if (stocks.length > 0 && stocks[0].dates && stocks[0].dates.length > 0) {
                    tradingDates = stocks[0].dates.slice(0, 4);
                } else {
                    tradingDates = getTradingDates(currentDataDateStr || '20250101', 4);
                }

                tableHead.innerHTML = `
                    <tr>
                        <th class="serial-col">#</th>
                        ${makeTh('股票代號', 'code')}
                        ${makeTh('股票名稱', 'name')}
                        ${makeTh(tradingDates[0] || 'Day 1', 'day0')}
                        ${makeTh(tradingDates[1] || 'Day 2', 'day1')}
                        ${makeTh(tradingDates[2] || 'Day 3', 'day2')}
                        ${makeTh(tradingDates[3] || 'Day 4', 'day3')}
                        ${makeTh('4日累計', 'total')}
                        ${makeTh('平均每日', 'average')}
                    </tr>
                `;

                stocks.forEach((stock, index) => {
                    const row = document.createElement('tr');

                    // 根據數值正負設定顏色類別
                    const day1Class = getColorClass(stock.day1);
                    const day2Class = getColorClass(stock.day2);
                    const day3Class = getColorClass(stock.day3);
                    const day4Class = getColorClass(stock.day4);
                    const totalClass = getColorClass(stock.total);
                    const avgClass = getColorClass(stock.average);

                    row.innerHTML = `
                        <td class="serial-col">${index + 1}</td>
                        <td class="stock-code"><a href="https://fubon-ebrokerdj.fbs.com.tw/z/zc/zcw/zcw1_${stock.code}.djhtm" target="_blank">${stock.code}</a></td>
                        <td class="stock-code"><a href="https://fubon-ebrokerdj.fbs.com.tw/z/zc/zcw/zcw1_${stock.code}.djhtm" target="_blank">${stock.name}</a></td>
                        <td class="${day1Class}">${stock.day1.toLocaleString()}</td>
                        <td class="${day2Class}">${stock.day2.toLocaleString()}</td>
                        <td class="${day3Class}">${stock.day3.toLocaleString()}</td>
                        <td class="${day4Class}">${stock.day4.toLocaleString()}</td>
                        <td class="${totalClass}" style="font-weight: bold;">${stock.total.toLocaleString()}</td>
                        <td class="${avgClass}">${stock.average.toLocaleString()}</td>
                    `;
                    tableBody.appendChild(row);
                });
            }
        }

        function updateStats(stocks = allFilteredStocks, sortBy = 'total') {
            if (sortBy === 'consecutive') {
                // 10 日模式統計
                const total10 = stocks.reduce((sum, stock) => {
                    const t10 = stock.foreignInvestors.slice(0, 10).reduce((s, v) => s + v, 0);
                    return sum + t10;
                }, 0);
                const avg10 = stocks.length > 0 ? Math.round(total10 / stocks.length) : 0;

                document.getElementById('totalStocks').textContent = stocks.length;
                document.getElementById('totalBuy').textContent = total10.toLocaleString();
                document.getElementById('avgBuy').textContent = avg10.toLocaleString();

                // 更新標籤
                document.querySelector('#stats .stat-card:nth-child(2) .stat-label').textContent = `10日累計${getTypeLabel()}（張）`;
                document.querySelector('#stats .stat-card:nth-child(3) .stat-label').textContent = `平均10日${getTypeLabel()}（張）`;
            } else {
                // 4 日模式統計
                const total = stocks.reduce((sum, stock) => sum + stock.total, 0);
                const avg = stocks.length > 0 ? Math.round(total / stocks.length) : 0;

                document.getElementById('totalStocks').textContent = stocks.length;
                document.getElementById('totalBuy').textContent = total.toLocaleString();
                document.getElementById('avgBuy').textContent = avg.toLocaleString();

                // 恢復標籤
                document.querySelector('#stats .stat-card:nth-child(2) .stat-label').textContent = `4日累計${getTypeLabel()}（張）`;
                document.querySelector('#stats .stat-card:nth-child(3) .stat-label').textContent = `平均每日${getTypeLabel()}（張）`;
            }
        }

        function searchStock() {
            const input = document.getElementById('searchInput');
            const filter = input.value.trim().toUpperCase();
            if (!filter) return;

            const tableBody = document.getElementById('tableBody');
            const rows = tableBody.getElementsByTagName('tr');
            let found = false;

            // 清除之前的 highlight
            const oldHighlights = document.getElementsByClassName('highlight-row');
            while (oldHighlights.length > 0) {
                oldHighlights[0].classList.remove('highlight-row');
            }

            for (let i = 0; i < rows.length; i++) {
                const codeCell = rows[i].getElementsByTagName('td')[1]; // 股票代號 is 2nd column (index 1) because of serial col
                const nameCell = rows[i].getElementsByTagName('td')[2]; // 股票名稱 is 3rd column (index 2)

                if (codeCell && nameCell) {
                    const code = codeCell.textContent || codeCell.innerText;
                    const name = nameCell.textContent || nameCell.innerText;

                    if (code.toUpperCase().indexOf(filter) > -1 || name.indexOf(filter) > -1) {
                        rows[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                        rows[i].classList.add('highlight-row');

                        // 2秒後移除 highlight
                        setTimeout(() => {
                            rows[i].classList.remove('highlight-row');
                        }, 3000);

                        found = true;
                        input.value = ''; // Optional: clear input
                        break; // 找到第一個就停
                    }
                }
            }

            if (!found) {
                alert('未找到符合的股票');
            }
        }

        // 頁面載入時執行
        init();
    </script>
</body>

</html>
