<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00981A ETF 持股內容</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .header,
        .controls,
        .chart-section,
        .table-wrap {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        .header {
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            line-height: 1.3;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .meta {
            color: #64748b;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.7;
        }

        .controls {
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        label {
            font-weight: 700;
            color: #334155;
        }

        input,
        select {
            min-height: 40px;
            min-width: 260px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 0.55rem 0.75rem;
            background: #ffffff;
            color: #0f172a;
            font-size: 0.95rem;
            outline: none;
        }

        select {
            min-width: 170px;
        }

        input:focus,
        select:focus {
            border-color: #0f766e;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }

        .summary {
            margin-left: auto;
            color: #475569;
            font-weight: 700;
        }

        .chart-section {
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: baseline;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .chart-header h2 {
            font-size: 1.2rem;
            color: #1e293b;
        }

        .chart-meta {
            color: #64748b;
            font-weight: 700;
            font-size: 0.92rem;
        }

        .bar-chart {
            display: grid;
            gap: 0.65rem;
        }

        .bar-row {
            display: grid;
            grid-template-columns: minmax(120px, 180px) 1fr 72px;
            gap: 0.75rem;
            align-items: center;
            min-height: 28px;
        }

        .bar-label {
            color: #334155;
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bar-track {
            height: 22px;
            border-radius: 6px;
            background: #e2e8f0;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            min-width: 2px;
            border-radius: 6px;
            background: #0f766e;
        }

        .bar-value {
            color: #0f172a;
            font-weight: 800;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .table-wrap {
            overflow: auto;
            max-height: 76vh;
        }

        table {
            width: 100%;
            min-width: 920px;
            border-collapse: collapse;
            font-size: 0.94rem;
        }

        th,
        td {
            border-bottom: 1px solid #e2e8f0;
            padding: 0.75rem 0.85rem;
            white-space: nowrap;
            text-align: right;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: #0f766e;
            color: #ffffff;
            font-weight: 800;
            cursor: pointer;
            user-select: none;
        }

        tbody tr:hover {
            background: #ecfdf5;
        }

        .text-cell,
        th.text-cell {
            text-align: left;
        }

        .name-cell,
        th.name-cell {
            width: calc(10em + 1.7rem);
            min-width: calc(10em + 1.7rem);
            max-width: calc(10em + 1.7rem);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .code-cell {
            color: #0f766e;
            font-weight: 800;
        }

        .muted {
            color: #64748b;
        }

        .change-cell {
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .change-cell.positive {
            color: #b91c1c;
        }

        .change-cell.negative {
            color: #047857;
        }

        .change-cell.neutral {
            color: #64748b;
        }

        .loading,
        .error,
        .empty {
            padding: 2rem;
            text-align: center;
            font-weight: 700;
        }

        .error {
            color: #991b1b;
            background: #fee2e2;
        }

        @media (max-width: 768px) {
            body {
                padding: 0.75rem;
            }

            h1 {
                font-size: 1.35rem;
            }

            .controls,
            .control-group {
                align-items: stretch;
                flex-direction: column;
                width: 100%;
            }

            input,
            select,
            .summary {
                width: 100%;
                min-width: 0;
                margin-left: 0;
            }

            .bar-row {
                grid-template-columns: 1fr;
                gap: 0.35rem;
            }

            .bar-value {
                text-align: left;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 id="pageTitle">00981A ETF 持股內容</h1>
            <div class="meta" id="pageMeta"></div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="holdingsDateSelect">持股日期</label>
                <select id="holdingsDateSelect" onchange="onHoldingsDateChanged()"></select>
            </div>
            <div class="control-group">
                <label for="industryDateSelect">產業日期</label>
                <select id="industryDateSelect" onchange="onIndustryDateChanged()"></select>
            </div>
            <div class="control-group">
                <label for="searchInput">搜尋</label>
                <input id="searchInput" type="text" placeholder="輸入標的代號或名稱" oninput="applyFiltersAndRender()">
            </div>
            <div class="summary" id="summaryText"></div>
        </div>

        <div class="chart-section">
            <div class="chart-header">
                <h2>產業分布比重</h2>
                <div class="chart-meta" id="chartMeta"></div>
            </div>
            <div id="industryChart" class="bar-chart">
                <div class="loading">載入產業分布中...</div>
            </div>
        </div>

        <div class="table-wrap">
            <div id="loading" class="loading">載入中...</div>
            <div id="error" class="error" style="display: none;"></div>
            <table id="dataTable" style="display: none;">
                <thead>
                    <tr>
                        <th data-key="rank">排名</th>
                        <th class="text-cell" data-key="symbol">標的代號</th>
                        <th class="text-cell name-cell" data-key="name">標的名稱</th>
                        <th data-key="weightPercent">權重(%)</th>
                        <th data-key="weightPercentChange">較前期增減</th>
                        <th data-key="quantity">持有數</th>
                        <th data-key="unit">單位</th>
                        <th data-key="date">日期</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const DATA_DIR = 'data_pocket';
        const FILES_DATA_FILE = `${DATA_DIR}/files.json`;
        const HOLDINGS_LATEST_FILE = '00981A_holdings_latest.json';
        const INDUSTRY_LATEST_FILE = '00981A_industry_distribution_latest.json';

        let filesIndex = null;
        let currentHoldingsFile = HOLDINGS_LATEST_FILE;
        let currentIndustryFile = INDUSTRY_LATEST_FILE;
        let payload = null;
        let industryPayload = null;
        let previousHoldingsPayload = null;
        let previousHoldingsBySymbol = new Map();
        let displayedRows = [];
        let sortState = { key: 'rank', direction: 'asc' };

        function getBasePath() {
            return window.location.hostname.includes('github.io') ? '/stock_data' : '..';
        }

        function formatDate(dateStr) {
            if (!/^\d{8}$/.test(String(dateStr || ''))) return dateStr || '';
            return `${dateStr.slice(0, 4)}/${dateStr.slice(4, 6)}/${dateStr.slice(6, 8)}`;
        }

        function formatNumber(value, digits = 0) {
            if (value == null || value === '') return '';
            return Number(value).toLocaleString('zh-TW', {
                minimumFractionDigits: digits,
                maximumFractionDigits: digits
            });
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function fetchJson(url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`無法載入資料: ${url}`);
            return response.json();
        }

        async function init() {
            try {
                const basePath = getBasePath();
                filesIndex = await fetchJson(`${basePath}/${FILES_DATA_FILE}`);
                normalizeFilesIndex();

                const params = new URLSearchParams(window.location.search);
                currentHoldingsFile = pickInitialFile(filesIndex.holdings, params.get('holdings'), HOLDINGS_LATEST_FILE);
                currentIndustryFile = pickInitialFile(filesIndex.industryDistribution, params.get('industry'), INDUSTRY_LATEST_FILE);

                document.querySelectorAll('th[data-key]').forEach(th => {
                    th.addEventListener('click', () => setSort(th.dataset.key));
                });

                renderDateOptions();
                await loadSelectedData();
            } catch (error) {
                showError(error.message);
            }
        }

        function normalizeFilesIndex() {
            if (Array.isArray(filesIndex)) {
                filesIndex = {
                    holdings: filesIndex.filter(file => /^00981A_holdings_\d{8}\.json$/.test(file)),
                    industryDistribution: filesIndex.filter(file => /^00981A_industry_distribution_\d{8}\.json$/.test(file)),
                    latest: {
                        holdings: HOLDINGS_LATEST_FILE,
                        industryDistribution: INDUSTRY_LATEST_FILE
                    }
                };
            }

            filesIndex.holdings = (filesIndex.holdings || []).slice().sort().reverse();
            filesIndex.industryDistribution = (filesIndex.industryDistribution || []).slice().sort().reverse();
        }

        function pickInitialFile(files, requestedFile, latestFile) {
            if (requestedFile && files.includes(requestedFile)) return requestedFile;
            return files[0] || latestFile;
        }

        function getDateFromFile(file) {
            const match = String(file || '').match(/_(\d{8})\.json$/);
            return match ? match[1] : '';
        }

        function getPreviousHoldingsFile(file) {
            const files = filesIndex?.holdings || [];
            const normalizedFile = file === HOLDINGS_LATEST_FILE ? files[0] : file;
            const currentIndex = files.indexOf(normalizedFile);
            return currentIndex >= 0 ? files[currentIndex + 1] : null;
        }

        function renderDateOptions() {
            renderSelectOptions('holdingsDateSelect', filesIndex.holdings, currentHoldingsFile, HOLDINGS_LATEST_FILE);
            renderSelectOptions('industryDateSelect', filesIndex.industryDistribution, currentIndustryFile, INDUSTRY_LATEST_FILE);
        }

        function renderSelectOptions(selectId, files, currentFile, latestFile) {
            const select = document.getElementById(selectId);
            const options = files.length > 0
                ? files.map(file => `<option value="${escapeHtml(file)}">${formatDate(getDateFromFile(file))}</option>`)
                : [`<option value="${latestFile}">latest</option>`];
            select.innerHTML = options.join('');
            select.value = currentFile;
        }

        async function onHoldingsDateChanged() {
            currentHoldingsFile = document.getElementById('holdingsDateSelect').value;
            await loadSelectedData();
        }

        async function onIndustryDateChanged() {
            currentIndustryFile = document.getElementById('industryDateSelect').value;
            await loadSelectedData();
        }

        async function loadSelectedData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('dataTable').style.display = 'none';
            document.getElementById('error').style.display = 'none';

            const basePath = getBasePath();
            const previousHoldingsFile = getPreviousHoldingsFile(currentHoldingsFile);
            [payload, industryPayload] = await Promise.all([
                fetchJson(`${basePath}/${DATA_DIR}/${currentHoldingsFile}`),
                fetchJson(`${basePath}/${DATA_DIR}/${currentIndustryFile}`)
            ]);
            previousHoldingsPayload = previousHoldingsFile
                ? await fetchJson(`${basePath}/${DATA_DIR}/${previousHoldingsFile}`)
                : null;
            previousHoldingsBySymbol = buildHoldingsBySymbol(previousHoldingsPayload?.holdings || []);

            document.title = payload.title || '00981A ETF 持股內容';
            document.getElementById('pageTitle').textContent = payload.title || '00981A ETF 持股內容';
            document.getElementById('pageMeta').textContent =
                `資料來源：${payload.source || 'Pocket 口袋證券'}；持股日期：${formatDate(payload.summary?.date)}；比較前期：${formatDate(previousHoldingsPayload?.summary?.date) || '無'}；產業日期：${formatDate(industryPayload.summary?.date)}；抓取時間：${new Date(payload.fetchedAt).toLocaleString('zh-TW')}`;

            const params = new URLSearchParams(window.location.search);
            params.set('holdings', currentHoldingsFile);
            params.set('industry', currentIndustryFile);
            window.history.replaceState({}, '', `${window.location.pathname}?${params.toString()}`);

            renderIndustryChart();
            applyFiltersAndRender();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dataTable').style.display = 'table';
        }

        function buildHoldingsBySymbol(holdings) {
            return new Map(holdings.map(row => [String(row.symbol), row]));
        }

        function enrichHoldingRow(row) {
            const previousRow = previousHoldingsBySymbol.get(String(row.symbol));
            const currentWeight = Number(row.weightPercent);
            const previousWeight = Number(previousRow?.weightPercent);
            const hasComparableWeight = Number.isFinite(currentWeight) && Number.isFinite(previousWeight);

            return {
                ...row,
                previousWeightPercent: hasComparableWeight ? previousWeight : null,
                weightPercentChange: hasComparableWeight ? currentWeight - previousWeight : null
            };
        }

        function setSort(key) {
            if (sortState.key === key) {
                sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortState = { key, direction: key === 'rank' ? 'asc' : 'desc' };
            }
            renderTable();
        }

        function applyFiltersAndRender() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const holdings = (payload?.holdings || []).map(enrichHoldingRow);

            displayedRows = holdings.filter(row => {
                if (!keyword) return true;
                return [row.symbol, row.name, row.unit, row.date].some(value =>
                    String(value ?? '').toLowerCase().includes(keyword)
                );
            });

            renderTable();
        }

        function compareRows(a, b) {
            const { key, direction } = sortState;
            const multiplier = direction === 'asc' ? 1 : -1;
            const aValue = a[key];
            const bValue = b[key];

            if (typeof aValue === 'number' || typeof bValue === 'number') {
                return ((aValue ?? -Infinity) - (bValue ?? -Infinity)) * multiplier;
            }

            return String(aValue ?? '').localeCompare(String(bValue ?? ''), 'zh-Hant') * multiplier;
        }

        function formatChange(value) {
            if (value == null) return '<span class="muted">-</span>';
            if (Math.abs(value) < 0.005) return '<span class="change-cell neutral">0.00%</span>';
            const sign = value > 0 ? '+' : '';
            const className = value > 0 ? 'positive' : 'negative';
            return `<span class="change-cell ${className}">${sign}${formatNumber(value, 2)}%</span>`;
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const rows = [...displayedRows].sort(compareRows);

            document.getElementById('summaryText').textContent =
                `顯示 ${rows.length.toLocaleString()} / ${(payload?.summary?.totalRows || 0).toLocaleString()} 筆；股票權重合計 ${formatNumber(payload?.summary?.totalWeightPercent, 2)}%`;

            if (rows.length === 0) {
                tbody.innerHTML = `<tr><td class="empty" colspan="8">沒有符合條件的資料</td></tr>`;
                return;
            }

            tbody.innerHTML = rows.map(row => `
                <tr>
                    <td>${formatNumber(row.rank)}</td>
                    <td class="text-cell code-cell">${escapeHtml(row.symbol)}</td>
                    <td class="text-cell name-cell" title="${escapeHtml(row.name)}">${escapeHtml(row.name)}</td>
                    <td>${row.weightPercent == null ? '<span class="muted">-</span>' : formatNumber(row.weightPercent, 2)}</td>
                    <td>${formatChange(row.weightPercentChange)}</td>
                    <td>${formatNumber(row.quantity)}</td>
                    <td>${escapeHtml(row.unit)}</td>
                    <td>${formatDate(row.date)}</td>
                </tr>
            `).join('');
        }

        function renderIndustryChart() {
            const chartEl = document.getElementById('industryChart');
            const rows = (industryPayload?.distribution || [])
                .filter(row => row.weightPercent > 0)
                .sort((a, b) => b.weightPercent - a.weightPercent);

            document.getElementById('chartMeta').textContent =
                `資料日期：${formatDate(industryPayload?.summary?.date)}；顯示 ${rows.length.toLocaleString()} 個產業`;

            if (rows.length === 0) {
                chartEl.innerHTML = '<div class="empty">沒有產業分布資料</div>';
                return;
            }

            const maxWeight = Math.max(...rows.map(row => row.weightPercent));
            chartEl.innerHTML = rows.map(row => {
                const width = maxWeight > 0 ? (row.weightPercent / maxWeight) * 100 : 0;
                return `
                    <div class="bar-row">
                        <div class="bar-label" title="${escapeHtml(row.industry)}">${escapeHtml(row.industry)}</div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${width.toFixed(2)}%;"></div>
                        </div>
                        <div class="bar-value">${formatNumber(row.weightPercent, 2)}%</div>
                    </div>
                `;
            }).join('');
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dataTable').style.display = 'none';
            document.getElementById('industryChart').innerHTML = '';
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        init();
    </script>
</body>

</html>
