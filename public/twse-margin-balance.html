<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信用交易融資融券餘額</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .container {
            max-width: 1900px;
            margin: 0 auto;
        }

        .header,
        .controls,
        .summary-card,
        .table-wrap {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        .header {
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            line-height: 1.3;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .meta {
            color: #64748b;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .controls {
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        label {
            font-weight: 700;
            color: #334155;
        }

        select,
        input {
            min-height: 40px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 0.55rem 0.75rem;
            background: #ffffff;
            color: #0f172a;
            font-size: 0.95rem;
            outline: none;
        }

        input {
            min-width: 260px;
        }

        select:focus,
        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .summary-card {
            border-radius: 8px;
            padding: 1rem;
        }

        .summary-label {
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 800;
            margin-bottom: 0.4rem;
        }

        .summary-value {
            color: #0f172a;
            font-size: 1.35rem;
            font-weight: 900;
        }

        .table-wrap {
            border-radius: 8px;
            overflow: auto;
            max-height: 76vh;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1520px;
            font-size: 0.92rem;
        }

        table.compact-table {
            min-width: 980px;
        }

        th,
        td {
            border-bottom: 1px solid #e2e8f0;
            padding: 0.72rem 0.8rem;
            white-space: nowrap;
            text-align: right;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 4;
            background: #1d4ed8;
            color: #ffffff;
            font-weight: 800;
            cursor: pointer;
            user-select: none;
        }

        tbody tr:hover {
            background: #eff6ff;
        }

        .text-cell,
        th.text-cell {
            text-align: left;
        }

        .code-cell {
            color: #1d4ed8;
            font-weight: 900;
        }

        .code-cell a {
            color: #1d4ed8;
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }

        .code-cell a:hover {
            color: #1e40af;
            border-bottom-color: #1e40af;
        }

        .positive {
            color: #dc2626;
            font-weight: 900;
        }

        .negative {
            color: #16a34a;
            font-weight: 900;
        }

        .muted {
            color: #64748b;
        }

        .price-cell {
            font-weight: 800;
        }

        .price-change {
            display: block;
            font-size: 0.78rem;
            font-weight: 800;
            margin-top: 0.15rem;
        }

        .sma-range-cell {
            text-align: center;
        }

        .loading,
        .error,
        .empty {
            padding: 2rem;
            text-align: center;
            font-weight: 700;
        }

        .error {
            color: #991b1b;
            background: #fee2e2;
        }

        @media (max-width: 768px) {
            body {
                padding: 0.75rem;
            }

            h1 {
                font-size: 1.35rem;
            }

            .controls,
            .control-group {
                align-items: stretch;
                flex-direction: column;
                width: 100%;
            }

            input,
            select {
                width: 100%;
                min-width: 0;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>信用交易融資融券餘額</h1>
            <div class="meta" id="pageMeta"></div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="dateSelect">資料日期</label>
                <select id="dateSelect" onchange="onDateChanged()"></select>
            </div>
            <div class="control-group">
                <label for="sortSelect">排序方式</label>
                <select id="sortSelect" onchange="onSortChanged()"></select>
            </div>
            <div class="control-group">
                <label for="columnSelect">欄位顯示</label>
                <select id="columnSelect" onchange="onColumnViewChanged()"></select>
            </div>
            <div class="control-group">
                <label for="marginThresholdSelect">融資門檻</label>
                <select id="marginThresholdSelect" onchange="onMarginThresholdChanged()"></select>
            </div>
            <div class="control-group">
                <label for="searchInput">搜尋</label>
                <input id="searchInput" type="text" placeholder="輸入股票代號或名稱" oninput="applyFiltersAndRender()">
            </div>
        </div>

        <div class="summary-grid" id="summaryGrid"></div>

        <div class="table-wrap">
            <div id="loading" class="loading">載入中...</div>
            <div id="error" class="error" style="display: none;"></div>
            <table id="dataTable" style="display: none;">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const DATA_DIR = 'data_twse_margin_balance';
        const INSTITUTIONAL_DATA_DIR = 'data_twse_institutional_investors';
        const MI_INDEX_DATA_DIR = 'data_twse_mi_index';
        const FUBON_DATA_DIR = 'data_fubon';
        const DEFAULT_FILE = '20260629_twse_margin_balance.csv';

        let files = [];
        let currentFile = '';
        let fields = [];
        let rows = [];
        let displayedRows = [];
        let institutionalMap = {};
        let volumeMap = {};
        let quoteMap = {};
        let smaRangeMap = {};
        let tenDayMarginDecreaseMap = {};
        let tenDayInstitutionalMap = {};
        let tenDayVolumeMap = {};
        let columnView = 'compact';
        let marginThreshold = 'over10000';
        let sortState = { key: 'tenDayMarginDecrease', direction: 'desc' };
        const SORT_OPTIONS = [
            { key: 'tenDayMarginDecrease', label: '近10日融資餘額減少' },
            { key: 'marginDecreasePercent', label: '融資減少百分比' },
            { key: 'field:6', label: '融資今日餘額' }
        ];
        const COLUMN_VIEW_OPTIONS = [
            { key: 'compact', label: '精簡欄位' },
            { key: 'full', label: '完整欄位' }
        ];
        const MARGIN_THRESHOLD_OPTIONS = [
            { key: 'over10000', label: '一萬以上' },
            { key: 'all', label: '全部' }
        ];

        function getBasePath() {
            return window.location.hostname.includes('github.io') ? '/stock_data' : '..';
        }

        function formatDate(dateStr) {
            if (!/^\d{8}$/.test(String(dateStr || ''))) return dateStr || '';
            return `${dateStr.slice(0, 4)}/${dateStr.slice(4, 6)}/${dateStr.slice(6, 8)}`;
        }

        function parseNumber(value) {
            const text = String(value ?? '').replace(/,/g, '').trim();
            if (!text) return null;
            const number = Number(text);
            return Number.isNaN(number) ? null : number;
        }

        function formatNumber(value) {
            const number = Number(value || 0);
            return number.toLocaleString('zh-TW');
        }

        function formatThousandsUnit(value) {
            if (value === null) return '-';
            return (value / 1000).toLocaleString('zh-TW', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 1
            });
        }

        function normalizeCell(value) {
            return String(value ?? '').trim();
        }

        function getStockLink(code) {
            return `https://fubon-ebrokerdj.fbs.com.tw/z/zc/zcw/zcw1_${encodeURIComponent(code)}.djhtm`;
        }

        function getMarginDecreasePercent(row) {
            const previousBalance = parseNumber(row[5]);
            const currentBalance = parseNumber(row[6]);
            if (!previousBalance || currentBalance === null) return null;
            return ((previousBalance - currentBalance) / previousBalance) * 100;
        }

        function getTenDayMarginDecrease(row) {
            return tenDayMarginDecreaseMap[normalizeCell(row[0])] ?? null;
        }

        function getDailyMarginBalanceChange(row) {
            const previousBalance = parseNumber(row[5]);
            const currentBalance = parseNumber(row[6]);
            if (previousBalance === null || currentBalance === null) return null;
            return currentBalance - previousBalance;
        }

        function getShortIncreasePercent(row) {
            const previousBalance = parseNumber(row[11]);
            const currentBalance = parseNumber(row[12]);
            if (!previousBalance || currentBalance === null) return null;
            return ((currentBalance - previousBalance) / previousBalance) * 100;
        }

        function formatDecreasePercent(value) {
            if (value === null) return '-';
            const balanceChangePercent = -value;
            const sign = balanceChangePercent > 0 ? '+' : '';
            return `${sign}${balanceChangePercent.toFixed(2)}%`;
        }

        function formatSignedPercent(value) {
            if (value === null) return '-';
            const sign = value > 0 ? '+' : '';
            return `${sign}${value.toFixed(2)}%`;
        }

        function formatSignedNumber(value) {
            if (value === null) return '-';
            const sign = value > 0 ? '+' : '';
            return `${sign}${formatNumber(value)}`;
        }

        function getSignValue(signHtml) {
            const text = String(signHtml || '');
            if (text.includes('-') || text.includes('－')) return -1;
            if (text.includes('+') || text.includes('＋')) return 1;
            return 0;
        }

        function getPriceChangePercent(row) {
            const close = parseNumber(row[8]);
            const change = parseNumber(row[10]);
            const sign = getSignValue(row[9]);
            if (close === null || change === null || sign === 0) return 0;
            const signedChange = change * sign;
            const previousClose = close - signedChange;
            if (!previousClose) return null;
            return (signedChange / previousClose) * 100;
        }

        function getAdDateKey(dateStr) {
            return `${dateStr.slice(0, 4)}/${dateStr.slice(4, 6)}/${dateStr.slice(6, 8)}`;
        }

        function getSmaRangeLabel(smaInfo) {
            const price = parseNumber(smaInfo?.Price);
            if (price === null) return '-';

            const availableSmas = ['SMA5', 'SMA20', 'SMA60', 'SMA240']
                .map(key => ({ key, value: parseNumber(smaInfo?.[key]) }))
                .filter(item => item.value !== null);

            if (availableSmas.length === 0) return '-';
            if (price >= availableSmas[0].value) return `> ${availableSmas[0].key}`;

            for (let i = 1; i < availableSmas.length; i += 1) {
                if (price >= availableSmas[i].value) {
                    return `${availableSmas[i - 1].key} ~ ${availableSmas[i].key}`;
                }
            }

            return `< ${availableSmas[availableSmas.length - 1].key}`;
        }

        function parseCsv(text) {
            const result = [];
            let row = [];
            let cell = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i += 1) {
                const char = text[i];
                const next = text[i + 1];

                if (char === '"') {
                    if (inQuotes && next === '"') {
                        cell += '"';
                        i += 1;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    row.push(cell);
                    cell = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && next === '\n') i += 1;
                    row.push(cell);
                    if (row.some(value => value !== '')) result.push(row);
                    row = [];
                    cell = '';
                } else {
                    cell += char;
                }
            }

            if (cell || row.length > 0) {
                row.push(cell);
                if (row.some(value => value !== '')) result.push(row);
            }

            return result;
        }

        async function fetchText(url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`無法載入資料: ${url}`);
            return response.text();
        }

        async function fetchJson(url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`無法載入資料清單: ${url}`);
            return response.json();
        }

        async function init() {
            try {
                const basePath = getBasePath();
                files = await fetchJson(`${basePath}/${DATA_DIR}/files.json`);
                files = files
                    .filter(file => /^\d{8}_twse_margin_balance\.csv$/.test(file))
                    .sort()
                    .reverse();

                if (files.length === 0) throw new Error('找不到信用交易融資融券餘額 CSV 檔');

                const params = new URLSearchParams(window.location.search);
                const queryFile = params.get('file');
                const querySort = params.get('sort');
                currentFile = queryFile && files.includes(queryFile)
                    ? queryFile
                    : files.includes(DEFAULT_FILE) ? DEFAULT_FILE : files[0];
                if (SORT_OPTIONS.some(option => option.key === querySort)) {
                    sortState = { key: querySort, direction: 'desc' };
                }

                renderDateOptions();
                renderSortOptions();
                renderColumnOptions();
                renderMarginThresholdOptions();
                await loadFile(currentFile);
            } catch (error) {
                showError(error.message);
            }
        }

        function renderDateOptions() {
            const dateSelect = document.getElementById('dateSelect');
            dateSelect.innerHTML = files.map(file => {
                const date = file.slice(0, 8);
                return `<option value="${file}">${formatDate(date)}</option>`;
            }).join('');
            dateSelect.value = currentFile;
        }

        function renderSortOptions() {
            const sortSelect = document.getElementById('sortSelect');
            sortSelect.innerHTML = SORT_OPTIONS.map(option => {
                return `<option value="${option.key}">${option.label}</option>`;
            }).join('');
            sortSelect.value = sortState.key;
        }

        function renderColumnOptions() {
            const columnSelect = document.getElementById('columnSelect');
            columnSelect.innerHTML = COLUMN_VIEW_OPTIONS.map(option => {
                return `<option value="${option.key}">${option.label}</option>`;
            }).join('');
            columnSelect.value = columnView;
        }

        function renderMarginThresholdOptions() {
            const marginThresholdSelect = document.getElementById('marginThresholdSelect');
            marginThresholdSelect.innerHTML = MARGIN_THRESHOLD_OPTIONS.map(option => {
                return `<option value="${option.key}">${option.label}</option>`;
            }).join('');
            marginThresholdSelect.value = marginThreshold;
        }

        async function onDateChanged() {
            currentFile = document.getElementById('dateSelect').value;
            await loadFile(currentFile);
        }

        function onSortChanged() {
            sortState = { key: document.getElementById('sortSelect').value, direction: 'desc' };
            updateUrlParams();
            applyFiltersAndRender();
        }

        function onColumnViewChanged() {
            columnView = document.getElementById('columnSelect').value;
            renderTable();
        }

        function onMarginThresholdChanged() {
            marginThreshold = document.getElementById('marginThresholdSelect').value;
            applyFiltersAndRender();
        }

        async function loadInstitutionalData(date) {
            try {
                const basePath = getBasePath();
                const payload = await fetchJson(`${basePath}/${INSTITUTIONAL_DATA_DIR}/${date}_twse_institutional_investors.json`);
                institutionalMap = {};
                (payload.data || []).forEach(row => {
                    const code = normalizeCell(row[0]);
                    if (!code) return;
                    institutionalMap[code] = {
                        foreign: parseNumber(row[4]),
                        investmentTrust: parseNumber(row[10]),
                        dealers: parseNumber(row[11])
                    };
                });
            } catch (error) {
                console.warn('無法載入三大法人資料', error);
                institutionalMap = {};
            }
        }

        async function loadMiIndexData(date) {
            try {
                const basePath = getBasePath();
                const payload = await fetchJson(`${basePath}/${MI_INDEX_DATA_DIR}/${date}_twse_mi_index.json`);
                const quoteTable = (payload.tables || []).find(table => {
                    const fieldsText = (table.fields || []).join('|');
                    return fieldsText.includes('證券代號') && fieldsText.includes('成交股數');
                });

                volumeMap = {};
                quoteMap = {};
                (quoteTable?.data || []).forEach(row => {
                    const code = normalizeCell(row[0]);
                    if (!code) return;
                    volumeMap[code] = parseNumber(row[2]);
                    quoteMap[code] = {
                        price: parseNumber(row[8]),
                        changePercent: getPriceChangePercent(row)
                    };
                });
            } catch (error) {
                console.warn('無法載入成交量資料', error);
                volumeMap = {};
                quoteMap = {};
            }
        }

        async function loadSmaData(date) {
            try {
                const basePath = getBasePath();
                const payload = await fetchJson(`${basePath}/${FUBON_DATA_DIR}/fubon_${date}_sma.json`);
                const dateKey = getAdDateKey(date);
                smaRangeMap = {};

                Object.entries(payload || {}).forEach(([code, stockData]) => {
                    smaRangeMap[code] = getSmaRangeLabel(stockData?.[dateKey]);
                });
            } catch (error) {
                console.warn('無法載入均線資料', error);
                smaRangeMap = {};
            }
        }

        async function loadTenDayMarginData(file) {
            const historyFiles = getTenDayHistoryFiles(file);
            const basePath = getBasePath();
            const csvTexts = await Promise.all(historyFiles.map(historyFile => {
                return fetchText(`${basePath}/${DATA_DIR}/${historyFile}`);
            }));

            tenDayMarginDecreaseMap = {};
            csvTexts.forEach(csvText => {
                parseCsv(csvText).slice(1).forEach(row => {
                    const code = normalizeCell(row[0]);
                    const previousBalance = parseNumber(row[5]);
                    const currentBalance = parseNumber(row[6]);
                    if (!code || previousBalance === null || currentBalance === null) return;
                    tenDayMarginDecreaseMap[code] =
                        (tenDayMarginDecreaseMap[code] || 0) + previousBalance - currentBalance;
                });
            });
        }

        function getTenDayHistoryFiles(file) {
            const fileIndex = files.indexOf(file);
            return fileIndex === -1 ? [] : files.slice(fileIndex, fileIndex + 10);
        }

        async function loadTenDayTradingData(file) {
            const basePath = getBasePath();
            const historyDates = getTenDayHistoryFiles(file).map(historyFile => historyFile.slice(0, 8));
            const dailyPayloads = await Promise.all(historyDates.map(async date => {
                const [institutionalPayload, miIndexPayload] = await Promise.all([
                    fetchJson(`${basePath}/${INSTITUTIONAL_DATA_DIR}/${date}_twse_institutional_investors.json`)
                        .catch(() => null),
                    fetchJson(`${basePath}/${MI_INDEX_DATA_DIR}/${date}_twse_mi_index.json`)
                        .catch(() => null)
                ]);
                return { institutionalPayload, miIndexPayload };
            }));

            tenDayInstitutionalMap = {};
            tenDayVolumeMap = {};
            dailyPayloads.forEach(({ institutionalPayload, miIndexPayload }) => {
                (institutionalPayload?.data || []).forEach(row => {
                    const code = normalizeCell(row[0]);
                    if (!code) return;
                    const totals = tenDayInstitutionalMap[code] || {
                        foreign: 0,
                        investmentTrust: 0,
                        dealers: 0
                    };
                    totals.foreign += parseNumber(row[4]) || 0;
                    totals.investmentTrust += parseNumber(row[10]) || 0;
                    totals.dealers += parseNumber(row[11]) || 0;
                    tenDayInstitutionalMap[code] = totals;
                });

                const quoteTable = (miIndexPayload?.tables || []).find(table => {
                    const fieldsText = (table.fields || []).join('|');
                    return fieldsText.includes('證券代號') && fieldsText.includes('成交股數');
                });
                (quoteTable?.data || []).forEach(row => {
                    const code = normalizeCell(row[0]);
                    const volume = parseNumber(row[2]);
                    if (!code || volume === null) return;
                    tenDayVolumeMap[code] = (tenDayVolumeMap[code] || 0) + volume;
                });
            });
        }

        function getInstitutionalValue(row, key) {
            const code = normalizeCell(row[0]);
            const sourceMap = sortState.key === 'tenDayMarginDecrease'
                ? tenDayInstitutionalMap
                : institutionalMap;
            return sourceMap[code]?.[key] ?? null;
        }

        function getVolumeValue(row) {
            const code = normalizeCell(row[0]);
            const sourceMap = sortState.key === 'tenDayMarginDecrease'
                ? tenDayVolumeMap
                : volumeMap;
            return sourceMap[code] ?? null;
        }

        function updateUrlParams() {
            const params = new URLSearchParams(window.location.search);
            params.set('file', currentFile);
            params.set('sort', sortState.key);
            window.history.replaceState({}, '', `${window.location.pathname}?${params.toString()}`);
        }

        async function loadFile(file) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('dataTable').style.display = 'none';
            document.getElementById('error').style.display = 'none';

            const basePath = getBasePath();
            const date = file.slice(0, 8);
            const csvText = await fetchText(`${basePath}/${DATA_DIR}/${file}`);
            await Promise.all([
                loadInstitutionalData(date),
                loadMiIndexData(date),
                loadSmaData(date),
                loadTenDayMarginData(file),
                loadTenDayTradingData(file)
            ]);
            const parsed = parseCsv(csvText);
            fields = parsed[0] || [];
            rows = parsed.slice(1);

            document.title = `信用交易融資融券餘額 ${formatDate(date)}`;
            document.getElementById('pageMeta').textContent =
                `資料日期：${formatDate(date)}；資料筆數：${rows.length.toLocaleString('zh-TW')}`;

            updateUrlParams();

            applyFiltersAndRender();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dataTable').style.display = 'table';
        }

        function applyFiltersAndRender() {
            const keyword = document.getElementById('searchInput').value.trim().toUpperCase();
            displayedRows = rows.filter(row => {
                const currentMarginBalance = parseNumber(row[6]) || 0;
                if (marginThreshold === 'over10000' && currentMarginBalance < 10000) return false;
                if (sortState.key === 'tenDayMarginDecrease' && (getTenDayMarginDecrease(row) || 0) <= 0) return false;

                if (!keyword) return true;
                const code = normalizeCell(row[0]).toUpperCase();
                const name = normalizeCell(row[1]).toUpperCase();
                return code.includes(keyword) || name.includes(keyword);
            });

            sortRows();
            renderSummary();
            renderTable();
        }

        function sortRows() {
            const { key, direction } = sortState;
            displayedRows = [...displayedRows].sort((a, b) => {
                const aValue = getSortValue(a, key);
                const bValue = getSortValue(b, key);
                const aNumber = typeof aValue === 'number' ? aValue : parseNumber(aValue);
                const bNumber = typeof bValue === 'number' ? bValue : parseNumber(bValue);

                let result;
                if (aNumber !== null && bNumber !== null) {
                    result = aNumber - bNumber;
                } else {
                    result = normalizeCell(aValue).localeCompare(normalizeCell(bValue), 'zh-Hant');
                }

                return direction === 'asc' ? result : -result;
            });
        }

        function getSortValue(row, key) {
            if (key === 'tenDayMarginDecrease') return getTenDayMarginDecrease(row);
            if (key === 'dailyMarginBalanceChange') return getDailyMarginBalanceChange(row);
            if (key === 'marginDecreasePercent') return getMarginDecreasePercent(row);
            if (key === 'shortIncreasePercent') return getShortIncreasePercent(row);
            if (key === 'price') return quoteMap[normalizeCell(row[0])]?.price ?? null;
            if (key === 'smaRange') return smaRangeMap[normalizeCell(row[0])] ?? '';
            if (key === 'volume') return getVolumeValue(row);
            if (key.startsWith('institutional:')) {
                return getInstitutionalValue(row, key.replace('institutional:', ''));
            }
            if (key.startsWith('field:')) return normalizeCell(row[Number(key.replace('field:', ''))]);
            return '';
        }

        function sortByKey(key) {
            if (sortState.key === key) {
                sortState.direction = sortState.direction === 'desc' ? 'asc' : 'desc';
            } else {
                sortState = { key, direction: 'desc' };
            }
            if (SORT_OPTIONS.some(option => option.key === key)) {
                document.getElementById('sortSelect').value = key;
                updateUrlParams();
            }
            applyFiltersAndRender();
        }

        function getFieldLabel(label, key) {
            const text = normalizeCell(label) || '#';
            if (sortState.key !== key) return text;
            return `${text}${sortState.direction === 'desc' ? ' ▼' : ' ▲'}`;
        }

        function sumField(index) {
            return displayedRows.reduce((sum, row) => sum + (parseNumber(row[index]) || 0), 0);
        }

        function renderSummary() {
            const cards = [
                ['顯示筆數', displayedRows.length.toLocaleString('zh-TW')],
                ['融資今日餘額', formatNumber(sumField(6))],
                ['融資買進', formatNumber(sumField(2))],
                ['融資賣出', formatNumber(sumField(3))],
                ['融券今日餘額', formatNumber(sumField(12))],
                ['融券賣出', formatNumber(sumField(9))]
            ];

            document.getElementById('summaryGrid').innerHTML = cards.map(([label, value]) => `
                <div class="summary-card">
                    <div class="summary-label">${label}</div>
                    <div class="summary-value">${value}</div>
                </div>
            `).join('');
        }

        function getCellClass(value, index) {
            if (index === 0) return 'text-cell code-cell';
            if (index === 1 || index === 15) return 'text-cell';
            const number = parseNumber(value);
            if (number === null) return 'muted';
            return '';
        }

        function getDisplayFields() {
            if (columnView === 'compact') {
                const periodLabel = sortState.key === 'tenDayMarginDecrease' ? '近10日' : '單日';
                const compactFields = [
                    { label: '股票代號', key: 'field:0', rawIndex: 0 },
                    { label: '股票名稱', key: 'field:1', rawIndex: 1 },
                    { label: '股票價格', key: 'price', rawIndex: null, type: 'price' },
                    { label: '均線區間', key: 'smaRange', rawIndex: null, type: 'smaRange' },
                    { label: '融資今日餘額', key: 'field:6', rawIndex: 6 },
                    { label: '較前日融資餘額增減', key: 'dailyMarginBalanceChange', rawIndex: null, type: 'dailyMarginBalanceChange' },
                    { label: '較前日融資餘額增減百分比', key: 'marginDecreasePercent', rawIndex: null, type: 'marginDecreasePercent' },
                    { label: '融券增加百分比', key: 'shortIncreasePercent', rawIndex: null, type: 'shortIncreasePercent' },
                    { label: `${periodLabel}外資買賣數量(千)`, key: 'institutional:foreign', rawIndex: null, type: 'institutional', institutionalKey: 'foreign' },
                    { label: `${periodLabel}投信買賣數量(千)`, key: 'institutional:investmentTrust', rawIndex: null, type: 'institutional', institutionalKey: 'investmentTrust' },
                    { label: `${periodLabel}自營商買賣數量(千)`, key: 'institutional:dealers', rawIndex: null, type: 'institutional', institutionalKey: 'dealers' },
                    { label: `${periodLabel}成交量(千)`, key: 'volume', rawIndex: null, type: 'volume' }
                ];
                if (sortState.key === 'tenDayMarginDecrease') {
                    compactFields.splice(4, 0, {
                        label: '近10日融資餘額減少',
                        key: 'tenDayMarginDecrease',
                        rawIndex: null,
                        type: 'tenDayMarginDecrease'
                    });
                }
                return compactFields;
            }

            const displayFields = [];
            fields.forEach((field, index) => {
                displayFields.push({ label: field, key: `field:${index}`, rawIndex: index });
                if (index === 1) {
                    displayFields.push({
                        label: '股票價格',
                        key: 'price',
                        rawIndex: null,
                        type: 'price'
                    });
                    displayFields.push({
                        label: '均線區間',
                        key: 'smaRange',
                        rawIndex: null,
                        type: 'smaRange'
                    });
                    if (sortState.key === 'tenDayMarginDecrease') {
                        displayFields.push({
                            label: '近10日融資餘額減少',
                            key: 'tenDayMarginDecrease',
                            rawIndex: null,
                            type: 'tenDayMarginDecrease'
                        });
                        displayFields.push({
                            label: '近10日外資買賣數量(千)',
                            key: 'institutional:foreign',
                            rawIndex: null,
                            type: 'institutional',
                            institutionalKey: 'foreign'
                        });
                        displayFields.push({
                            label: '近10日投信買賣數量(千)',
                            key: 'institutional:investmentTrust',
                            rawIndex: null,
                            type: 'institutional',
                            institutionalKey: 'investmentTrust'
                        });
                        displayFields.push({
                            label: '近10日自營商買賣數量(千)',
                            key: 'institutional:dealers',
                            rawIndex: null,
                            type: 'institutional',
                            institutionalKey: 'dealers'
                        });
                    }
                    displayFields.push({
                        label: '較前日融資餘額增減',
                        key: 'dailyMarginBalanceChange',
                        rawIndex: null,
                        type: 'dailyMarginBalanceChange'
                    });
                    displayFields.push({
                        label: '較前日融資餘額增減百分比',
                        key: 'marginDecreasePercent',
                        rawIndex: null,
                        type: 'marginDecreasePercent'
                    });
                    displayFields.push({
                        label: sortState.key === 'tenDayMarginDecrease' ? '近10日成交量(千)' : '單日成交量(千)',
                        key: 'volume',
                        rawIndex: null,
                        type: 'volume'
                    });
                }
            });
            return displayFields;
        }

        function renderTable() {
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');
            const displayFields = getDisplayFields();
            document.getElementById('dataTable').className = columnView === 'compact' ? 'compact-table' : '';

            tableHead.innerHTML = `<tr>${displayFields.map(field => {
                const textClass = field.type === 'smaRange'
                    ? ' class="sma-range-cell"'
                    : field.rawIndex !== null && (field.rawIndex <= 1 || field.rawIndex === 15)
                    ? ' class="text-cell"'
                    : '';
                return `<th${textClass} onclick="sortByKey('${field.key}')">${getFieldLabel(field.label, field.key)}</th>`;
            }).join('')}</tr>`;

            if (displayedRows.length === 0) {
                tableBody.innerHTML = `<tr><td class="empty" colspan="${displayFields.length}">沒有符合條件的資料</td></tr>`;
                return;
            }

            tableBody.innerHTML = displayedRows.map(row => {
                const cells = displayFields.map(field => {
                    if (field.type === 'tenDayMarginDecrease') {
                        const value = getTenDayMarginDecrease(row);
                        const className = value === null ? 'muted' : value > 0 ? 'negative' : value < 0 ? 'positive' : '';
                        const classAttr = className ? ` class="${className}"` : '';
                        return `<td${classAttr}>${value === null ? '-' : formatNumber(value)}</td>`;
                    }

                    if (field.type === 'dailyMarginBalanceChange') {
                        const value = getDailyMarginBalanceChange(row);
                        const className = value === null ? 'muted' : value > 0 ? 'positive' : value < 0 ? 'negative' : '';
                        const classAttr = className ? ` class="${className}"` : '';
                        return `<td${classAttr}>${formatSignedNumber(value)}</td>`;
                    }

                    if (field.type === 'marginDecreasePercent') {
                        const value = getMarginDecreasePercent(row);
                        const className = value === null ? 'muted' : value > 0 ? 'negative' : value < 0 ? 'positive' : '';
                        const classAttr = className ? ` class="${className}"` : '';
                        return `<td${classAttr}>${formatDecreasePercent(value)}</td>`;
                    }

                    if (field.type === 'shortIncreasePercent') {
                        const value = getShortIncreasePercent(row);
                        const className = value === null ? 'muted' : value > 0 ? 'positive' : value < 0 ? 'negative' : '';
                        const classAttr = className ? ` class="${className}"` : '';
                        return `<td${classAttr}>${formatSignedPercent(value)}</td>`;
                    }

                    if (field.type === 'institutional') {
                        const value = getInstitutionalValue(row, field.institutionalKey);
                        const className = value === null ? 'muted' : value > 0 ? 'positive' : value < 0 ? 'negative' : '';
                        const classAttr = className ? ` class="${className}"` : '';
                        return `<td${classAttr}>${formatThousandsUnit(value)}</td>`;
                    }

                    if (field.type === 'volume') {
                        const value = getVolumeValue(row);
                        const className = value === null ? 'muted' : '';
                        const classAttr = className ? ` class="${className}"` : '';
                        return `<td${classAttr}>${formatThousandsUnit(value)}</td>`;
                    }

                    if (field.type === 'price') {
                        const quote = quoteMap[normalizeCell(row[0])] || {};
                        const price = quote.price ?? null;
                        const changePercent = quote.changePercent ?? null;
                        const changeClass = changePercent > 0 ? 'positive' : changePercent < 0 ? 'negative' : 'muted';
                        const priceText = price === null ? '-' : price.toLocaleString('zh-TW', { maximumFractionDigits: 2 });
                        const changeText = changePercent === null ? '-' : formatSignedPercent(changePercent);
                        return `<td class="price-cell">${priceText}<span class="price-change ${changeClass}">${changeText}</span></td>`;
                    }

                    if (field.type === 'smaRange') {
                        return `<td class="sma-range-cell">${smaRangeMap[normalizeCell(row[0])] || '-'}</td>`;
                    }

                    const index = field.rawIndex;
                    const value = normalizeCell(row[index]);
                    const className = getCellClass(value, index);
                    const classAttr = className ? ` class="${className}"` : '';
                    const number = parseNumber(value);
                    const text = number !== null && index > 1 && index !== 15 ? formatNumber(number) : value || '-';
                    if (index === 0 && value) {
                        return `<td${classAttr}><a href="${getStockLink(value)}" target="_blank">${value}</a></td>`;
                    }
                    return `<td${classAttr}>${text}</td>`;
                }).join('');
                return `<tr>${cells}</tr>`;
            }).join('');
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dataTable').style.display = 'none';
            const error = document.getElementById('error');
            error.style.display = 'block';
            error.textContent = message;
        }

        init();
    </script>
</body>

</html>
